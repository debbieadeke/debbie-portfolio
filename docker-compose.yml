# version: "3.8"

services:
  web:
    build: .
    ports:
      - "5173:5173" # Map container port to local port
    volumes:
      - .:/app      # Mount project folder to container
      - /app/node_modules # Prevent overwriting node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Ensures live reload works in Docker
